name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: ${{ matrix.project }} (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11" ]
        project:
          - "01-llm-eval-harness"
          - "02-agentic-rag"
          - "03-vae-latent"
          - "04-diffusion-timeseries"
          - "05-wgan-gp-rare-events"

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project requirements
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ruff==0.4.8 black==24.8.0

      - name: Ruff lint
        run: |
          ruff check --output-format=github --ignore E501 .

      - name: Black format check
        run: |
          black --check --diff src || (echo "::warning::Black formatting needed"; exit 1)

      - name: Smoke test
        run: |
          set -euxo pipefail
          case "${{ matrix.project }}" in
            "01-llm-eval-harness")
              mkdir -p data reports
              cat > data/eval_samples.jsonl <<'EOF'
              {"id":"1","question":"What is hypertension?","answer":"yes","context":"Hypertension is high blood pressure."}
              EOF
              printf "Hypertension is high blood pressure.\n" > data/corpus.txt
              python src/data.py --build-index --corpus data/corpus.txt --index data/faiss.index --embeddings data/embeddings.npy
              python - <<'PY'
              import json; print("LLM harness imports OK")
              PY
              ;;
            "02-agentic-rag")
              mkdir -p data/raw_pdfs data reports
              printf "GLP-1 agonists may cause GI adverse events.\nDPP-4 inhibitors have different safety profile.\n" > data/raw_pdfs/sample.txt
              python src/retriever.py --ingest data/raw_pdfs --out data/corpus.txt
              python src/app.py --question "Compare safety profiles of GLP-1 agonists vs DPP-4 inhibitors" --corpus data/corpus.txt --index data/faiss.index
              test -f reports/agentic_rag.json
              ;;
            "03-vae-latent")
              mkdir -p data artifacts
              python - <<'PY'
              import pandas as pd, numpy as np, os
              X = pd.DataFrame(np.random.randn(512, 32))
              X.to_csv("data/features.csv", index=False)
              PY
              python src/train_vae.py --csv data/features.csv --epochs 1 --latent-dim 8 --batch 64
              python src/evaluate.py --model artifacts/vae.pt --csv data/features.csv
              ;;
            "04-diffusion-timeseries")
              mkdir -p data artifacts
              python - <<'PY'
              import pandas as pd, numpy as np
              X = pd.DataFrame(np.random.randn(256, 128))
              X.to_csv("data/windows.csv", index=False)
              PY
              python src/train_ddpm.py --csv data/windows.csv --steps 50 --epochs 1 --batch 32
              python src/evaluate.py --model artifacts/ddpm.pt --n 2 --out artifacts/samples.npy
              ;;
            "05-wgan-gp-rare-events")
              mkdir -p data artifacts
              python - <<'PY'
              import pandas as pd, numpy as np
              n=1000; d=20
              X = pd.DataFrame(np.random.randn(n, d), columns=[f"f{i}" for i in range(d)])
              y = (np.random.rand(n) < 0.05).astype(int)
              X["Class"]=y
              X.to_csv("data/creditcard.csv", index=False)
              PY
              python src/train_wgan_gp.py --csv data/creditcard.csv --epochs 1 --batch 128 --z-dim 16
              python src/evaluate.py --csv data/creditcard.csv --gen artifacts/gen.npy
              ;;
          esac
